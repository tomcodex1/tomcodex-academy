<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in with Google - TomCodeX Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-[#f0f4f9] min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl shadow-xl w-full max-w-[450px] p-10 flex flex-col items-center border border-slate-200">
    <!-- Google Logo -->
    <div class="mb-6">
      <svg class="h-10 w-auto" viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
    </div>

    <!-- Header -->
    <h1 class="text-2xl font-semibold text-[#1f1f1f] text-center mb-2">Choose an account</h1>
    <p class="text-sm text-[#444746] text-center mb-8">to continue to <span class="font-medium text-brand-600">TomCodeX Academy</span></p>

    <!-- Account Picker -->
    <div class="w-full space-y-2 mb-6">
      <button class="account-btn w-full flex items-center gap-3 p-3 rounded-xl border border-slate-200 hover:bg-slate-50 transition text-left" data-email="vijay.google@tomcodex.com" data-name="Vijay Kumar">
        <div class="h-10 w-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-lg">V</div>
        <div>
          <div class="text-sm font-semibold text-[#1f1f1f]">Vijay Kumar</div>
          <div class="text-xs text-[#5f6368]">vijay.google@tomcodex.com</div>
        </div>
      </button>

      <button class="account-btn w-full flex items-center gap-3 p-3 rounded-xl border border-slate-200 hover:bg-slate-50 transition text-left" data-email="learner.google@tomcodex.com" data-name="Demo Student">
        <div class="h-10 w-10 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 font-bold text-lg">D</div>
        <div>
          <div class="text-sm font-semibold text-[#1f1f1f]">Demo Student</div>
          <div class="text-xs text-[#5f6368]">learner.google@tomcodex.com</div>
        </div>
      </button>

      <div class="border-t border-slate-100 my-4"></div>

      <!-- Custom Input Form -->
      <form id="customAccountForm" class="w-full space-y-3 mt-4">
        <div class="text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">Or use another Google account</div>
        <div>
          <label class="block text-xs text-slate-500 mb-1 font-semibold">Mock Name</label>
          <input type="text" id="customName" placeholder="Enter Full Name" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1 font-semibold">Mock Google Email</label>
          <input type="email" id="customEmail" placeholder="username@gmail.com" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" class="w-full bg-[#1a73e8] hover:bg-[#1557b0] text-white text-sm font-semibold py-2.5 rounded-lg transition">
          Continue with custom account
        </button>
      </form>
    </div>

    <!-- Footer Notes -->
    <p class="text-xs text-[#5f6368] text-center leading-relaxed">
      This is a secure, sandboxed simulated Google OAuth session. No passwords are required. TomCodeX will only receive your mock email and profile name.
    </p>
  </div>

  <script>
    function completeAuth(email, name) {
      const targetUrl = `/api/auth/google/callback?mock=true&email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}`;
      window.location.href = targetUrl;
    }

    document.querySelectorAll('.account-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const email = btn.getAttribute('data-email');
        const name = btn.getAttribute('data-name');
        completeAuth(email, name);
      });
    });

    document.getElementById('customAccountForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('customEmail').value.trim();
      const name = document.getElementById('customName').value.trim();
      completeAuth(email, name);
    });
  </script>
</body>
</html>
